<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOL NAILS BEAUTY - Agenda 2026</title>
    <style>
        :root {
            --primary-color: #d63384;
            --secondary-color: #f8d7da;
            --accent-color: #ff6b9d;
            --gold-color: #ffd700;
            --text-color: #333;
            --bg-gradient-1: #ff9a9e;
            --bg-gradient-2: #fad0c4;
            --bg-gradient-3: #ffd1ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #ffd1ff 50%, #a18cd1 75%, #fbc2eb 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ANIMACIÓN DEL FONDO */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ELEMENTOS DECORATIVOS DE FONDO */
        .bg-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        .bg-circle {
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255,255,255,0.4), rgba(255,105,180,0.2));
            animation: float 6s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 5%; animation-delay: 0s; }
        .bg-circle:nth-child(2) { width: 300px; height: 300px; top: 60%; right: 10%; animation-delay: 2s; }
        .bg-circle:nth-child(3) { width: 150px; height: 150px; bottom: 20%; left: 15%; animation-delay: 4s; }
        .bg-circle:nth-child(4) { width: 250px; height: 250px; top: 30%; right: 30%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* SPARKLES */
        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
            box-shadow: 0 0 10px 2px rgba(255,255,255,0.8);
        }

        .sparkle:nth-child(5) { top: 20%; left: 30%; animation-delay: 0s; }
        .sparkle:nth-child(6) { top: 70%; left: 80%; animation-delay: 0.5s; }
        .sparkle:nth-child(7) { top: 40%; left: 60%; animation-delay: 1s; }
        .sparkle:nth-child(8) { top: 80%; left: 20%; animation-delay: 1.5s; }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
            backdrop-filter: blur(10px);
            width: 100%;
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 8px 32px rgba(214, 51, 132, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--primary-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
            z-index: 101;
        }

        .logo-acronym {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #d63384, #ff6b9d);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.6rem;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(214, 51, 132, 0.6), 0 0 40px rgba(255, 105, 180, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(214, 51, 132, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(214, 51, 132, 0.8); }
        }

        h1 {
            background: linear-gradient(135deg, #d63384, #ff6b9d, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* CONTENEDORES */
        .page-section {
            display: none;
            width: 100%;
            max-width: 900px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .active-section { display: block; }

        /* SELECTOR DE FECHA */
        .date-selector-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(214, 51, 132, 0.2);
            border: 2px solid rgba(255,255,255,0.5);
        }

        .date-label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        input[type="date"] {
            padding: 15px;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--primary-color);
            font-family: inherit;
            outline: none;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="date"]:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(214, 51, 132, 0.3);
        }

        /* GRID DE TURNOS */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .slot-card {
            border: none;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .slot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .slot-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.3);
        }

        .time {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--text-color);
            display: block;
            margin-bottom: 8px;
        }

        .status {
            font-size: 0.8rem;
            margin-top: 5px;
            text-transform: uppercase;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .client-name {
            font-size: 0.85rem;
            margin-top: 8px;
            color: #666;
            font-style: italic;
            background: rgba(0,0,0,0.05);
            padding: 5px 10px;
            border-radius: 8px;
        }

        .slot-card.available {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border: 2px solid #198754;
        }

        .slot-card.available .status {
            color: #198754;
            background: rgba(25, 135, 84, 0.1);
        }

        .slot-card.available .time {
            color: #198754;
        }
        
        .slot-card.reserved {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            border: 2px solid #dc3545;
            opacity: 0.95;
            cursor: not-allowed;
        }

        .slot-card.reserved .status {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }

        .slot-card.reserved .time {
            color: #dc3545;
        }

        /* LOGIN & ADMIN */
        .login-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,255,255,0.95));
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(214, 51, 132, 0.3);
            text-align: center;
            max-width: 450px;
            margin: 50px auto;
            border: 2px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 10;
        }

        .login-box h3 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        input[type="text"], input[type="password"] {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 10px 0;
            width: 90%;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(214, 51, 132, 0.3);
            outline: none;
        }

        button {
            padding: 15px 35px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(214, 51, 132, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.6);
            background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.5);
        }

        .admin-header h2 {
            color: var(--primary-color);
            margin: 0;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.5);
        }

        .admin-table th, .admin-table td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid rgba(214, 51, 132, 0.1);
        }

        .admin-table th {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-table tr:hover {
            background: rgba(214, 51, 132, 0.05);
        }

        .admin-input-name {
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .btn-save {
            background: linear-gradient(135deg, #198754, #20c997);
            padding: 8px 15px;
            font-size: 0.85rem;
            border-radius: 20px;
        }

        .btn-clear {
            background: linear-gradient(135deg, #6c757d, #868e96);
            padding: 8px 15px;
            font-size: 0.85rem;
            border-radius: 20px;
            margin-left: 5px;
        }

        .btn-logout {
            background: linear-gradient(135deg, #333, #555);
            border-radius: 20px;
            padding: 10px 25px;
        }

        .no-slots-msg {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-style: italic;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }

        /* LINK DE ACCESO ADMIN */
        .admin-link {
            color: var(--primary-color);
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 10px;
        }

        .admin-link:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .logo-acronym { width: 55px; height: 55px; font-size: 1.3rem; }
            .schedule-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .admin-table { font-size: 0.85rem; }
            .admin-table th, .admin-table td { padding: 10px; }
        }

        /* NAIL ART DECORATION */
        .nail-decoration {
            position: fixed;
            font-size: 3rem;
            opacity: 0.15;
            z-index: 1;
            animation: float 8s ease-in-out infinite;
        }

        .nail-decoration:nth-child(9) { top: 15%; left: 8%; content: '💅'; }
        .nail-decoration:nth-child(10) { top: 50%; right: 5%; content: '✨'; }
        .nail-decoration:nth-child(11) { bottom: 25%; left: 10%; content: '🌸'; }
        .nail-decoration:nth-child(12) { top: 35%; right: 15%; content: '💖'; }
    </style>
</head>
<body>

    <!-- ELEMENTOS DECORATIVOS DE FONDO -->
    <div class="bg-decoration bg-circle"></div>
    <div class="bg-decoration bg-circle"></div>
    <div class="bg-decoration bg-circle"></div>
    <div class="bg-decoration bg-circle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="nail-decoration">💅</div>
    <div class="nail-decoration">✨</div>
    <div class="nail-decoration">🌸</div>
    <div class="nail-decoration">💖</div>

    <header>
        <div class="logo-container">
            <div class="logo-acronym">SNB</div>
            <h1>Sol Nails Beauty</h1>
        </div>
    </header>

    <!-- 1. SECCIÓN VISITANTE (HOME) -->
    <div id="section-home" class="page-section active-section">
        <div class="date-selector-container">
            <label class="date-label">📅 Selecciona un día para ver turnos (2026)</label>
            <input type="date" id="visitor-date-picker" onchange="loadVisitorSlots()">
            <p id="visitor-date-display" style="margin-top:15px; font-weight:bold; color:var(--primary-color); font-size: 1.1rem;"></p>
        </div>
        
        <div class="schedule-grid" id="visitor-slots">
            <!-- Se llena con JS -->
        </div>
        <div id="visitor-msg" class="no-slots-msg"></div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="#" onclick="showLogin()" class="admin-link">🔐 Acceso Admin</a>
        </div>
    </div>

    <!-- 2. SECCIÓN LOGIN -->
    <div id="section-login" class="page-section">
        <div class="login-box">
            <h3>👑 Acceso Administrativo</h3>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Ingresar</button>
            <br><br>
            <button onclick="showHome()" style="background: linear-gradient(135deg, #ccc, #999);">⬅ Volver</button>
        </div>
    </div>

    <!-- 3. SECCIÓN ADMIN DASHBOARD -->
    <div id="section-admin" class="page-section">
        <div class="admin-header">
            <h2>🎨 Panel de Control</h2>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="date-selector-container" style="text-align: left;">
            <label class="date-label">📆 Gestionar turnos para el día:</label>
            <input type="date" id="admin-date-picker" min="2026-01-01" max="2026-12-31" onchange="loadAdminSlots()">
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>⏰ Horario</th>
                    <th>📌 Estado</th>
                    <th>👤 Nombre del Cliente</th>
                    <th>⚙️ Acciones</th>
                </tr>
            </thead>
            <tbody id="admin-slots-body">
                <!-- Se llena con JS -->
            </tbody>
        </table>
    </div>

    <script>
        // CONFIGURACIÓN
        const WHATSAPP_NUMBER = "5492268403448"; 
        const START_HOUR = 8;
        const END_HOUR = 16;
        
        // FERIDOS ARGENTINA 2026 (Formato MM-DD)
        const HOLIDAYS_2026 = [
            "01-01", "02-24", "02-25", "03-24", "04-02", "04-03",
            "05-01", "05-25", "06-17", "07-09", "08-17", "10-12",
            "11-20", "12-08", "12-25"
        ];

        let currentSlots = [];

        // 1. INICIALIZAR
        function init() {
            setupDatePickers();
            let defaultDate = "2026-01-05";
            const today = new Date();
            if(today.getFullYear() === 2026 && isBusinessDay(today)) {
                defaultDate = today.toISOString().split('T')[0];
            }
            document.getElementById('visitor-date-picker').value = defaultDate;
            document.getElementById('admin-date-picker').value = defaultDate;
            loadVisitorSlots();
        }

        function setupDatePickers() {
            const minDate = "2026-01-01";
            const maxDate = "2026-12-31";
            const vPicker = document.getElementById('visitor-date-picker');
            const aPicker = document.getElementById('admin-date-picker');
            vPicker.min = minDate; vPicker.max = maxDate;
            aPicker.min = minDate; aPicker.max = maxDate;
        }

        // 2. LÓGICA DE FECHAS Y DÍAS HÁBILES
        function isBusinessDay(dateObj) {
            const day = dateObj.getDay();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const date = String(dateObj.getDate()).padStart(2, '0');
            const dateStr = `${month}-${date}`;
            if (day === 0 || day === 6) return false;
            if (HOLIDAYS_2026.includes(dateStr)) return false;
            return true;
        }

        // 3. NAVEGACIÓN
        function showHome() {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active-section'));
            document.getElementById('section-home').classList.add('active-section');
            loadVisitorSlots();
        }

        function showLogin() {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active-section'));
            document.getElementById('section-login').classList.add('active-section');
        }

        function showAdmin() {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active-section'));
            document.getElementById('section-admin').classList.add('active-section');
            loadAdminSlots();
        }

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'SOLNAILSBEAUTY' && pass === 'Apeotito123#') {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                showAdmin();
            } else {
                alert('❌ Credenciales incorrectas');
            }
        }

        function logout() { showHome(); }

        // 4. GESTIÓN DE DATOS
        function getSlotsForDate(dateStr) {
            const data = localStorage.getItem('snb_slots_2026_' + dateStr);
            if (data) return JSON.parse(data);
            let newSlots = [];
            for (let i = START_HOUR; i < END_HOUR; i++) {
                newSlots.push({ time: `${i}:00`, isReserved: false, clientName: '' });
            }
            return newSlots;
        }

        function saveSlotsForDate(dateStr, slots) {
            localStorage.setItem('snb_slots_2026_' + dateStr, JSON.stringify(slots));
        }

        // 5. RENDERIZADO VISITANTE
        function loadVisitorSlots() {
            const dateInput = document.getElementById('visitor-date-picker').value;
            if (!dateInput) return;

            const dateObj = new Date(dateInput + 'T00:00:00');
            const display = document.getElementById('visitor-date-display');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            display.innerText = dateObj.toLocaleDateString('es-AR', options).charAt(0).toUpperCase() + dateObj.toLocaleDateString('es-AR', options).slice(1);

            if (!isBusinessDay(dateObj)) {
                document.getElementById('visitor-slots').innerHTML = '';
                document.getElementById('visitor-msg').innerText = "⚠️ Este día no es hábil (Fin de semana o Feriado).";
                return;
            }
            document.getElementById('visitor-msg').innerText = "";

            currentSlots = getSlotsForDate(dateInput);
            const container = document.getElementById('visitor-slots');
            container.innerHTML = '';

            currentSlots.forEach(slot => {
                const card = document.createElement('div');
                const isReserved = slot.isReserved;
                card.className = `slot-card ${isReserved ? 'reserved' : 'available'}`;
                
                let html = `<span class="time">${slot.time} hs</span>`;
                if (isReserved) {
                    html += `<span class="status">🔒 OCUPADO</span>`;
                } else {
                    html += `<span class="status">✅ DISPONIBLE</span>`;
                    card.onclick = () => openWhatsApp(slot.time, dateInput);
                }
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function openWhatsApp(time, date) {
            const dateObj = new Date(date + 'T00:00:00');
            const dateStr = dateObj.toLocaleDateString('es-AR');
            const message = `💅 Hola Sol Nails Beauty, quisiera reservar el turno del día ${dateStr} a las ${time}hs.`;
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        // 6. RENDERIZADO ADMIN
        function loadAdminSlots() {
            const dateInput = document.getElementById('admin-date-picker').value;
            if (!dateInput) return;

            const dateObj = new Date(dateInput + 'T00:00:00');
            if (!isBusinessDay(dateObj)) {
                alert("⚠️ Atención: Estás seleccionando un fin de semana o feriado. ¿Seguro que quieres gestionar turnos?");
            }

            currentSlots = getSlotsForDate(dateInput);
            const tbody = document.getElementById('admin-slots-body');
            tbody.innerHTML = '';

            currentSlots.forEach((slot, index) => {
                const tr = document.createElement('tr');
                if(slot.isReserved) tr.style.backgroundColor = 'rgba(255, 105, 180, 0.1)';

                tr.innerHTML = `
                    <td><strong>${slot.time} hs</strong></td>
                    <td>
                        <span style="color: ${slot.isReserved ? '#dc3545' : '#198754'}; font-weight: bold;">
                            ${slot.isReserved ? '🔴 RESERVADO' : '🟢 LIBRE'}
                        </span>
                    </td>
                    <td>
                        <input type="text" class="admin-input-name" id="name-${index}" value="${slot.clientName}" placeholder="Nombre del cliente">
                    </td>
                    <td>
                        <button class="btn-save" onclick="updateSlot(${index})">💾 Guardar</button>
                        <button class="btn-clear" onclick="clearSlot(${index})">🗑️ Limpiar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateSlot(index) {
            const nameInput = document.getElementById(`name-${index}`);
            const name = nameInput.value.trim();
            if (name === "") { alert("⚠️ Escribe un nombre."); return; }

            currentSlots[index].clientName = name;
            currentSlots[index].isReserved = true;
            
            const dateInput = document.getElementById('admin-date-picker').value;
            saveSlotsForDate(dateInput, currentSlots);
            loadAdminSlots();
            alert(`✅ Turno reservado para ${name}`);
        }

        function clearSlot(index) {
            if(confirm("¿🗑️ Liberar turno?")) {
                currentSlots[index].clientName = '';
                currentSlots[index].isReserved = false;
                const dateInput = document.getElementById('admin-date-picker').value;
                saveSlotsForDate(dateInput, currentSlots);
                loadAdminSlots();
            }
        }

        // Iniciar App
        init();
    </script>
</body>
</html>
